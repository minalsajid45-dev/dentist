<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Yabna Dental Clinic</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Yabna<span>Dental</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="dentists.html">Our Dentists</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="testimonials.html">Reviews</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="book-appointment.html" class="cta-nav active">Book Now</a>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>Online Appointment Booking</h1>
            <p>Schedule your visit in just a few minutes.</p>
        </div>
    </section>

    <section class="booking-section">
        <div class="container">
            <form class="booking-form shadow-box" id="bookingForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                    </div>
                    <div class="form-group">
                        <label for="service">Service Required</label>
                        <select id="service">
                            <option value="general">General Dentistry</option>
                            <option value="cosmetic">Cosmetic Dentistry</option>
                            <option value="pediatric">Pediatric Dentistry</option>
                            <option value="surgery">Oral Surgery</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Preferred Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Preferred Time</label>
                        <select id="time">
                            <option value="morning">Morning (9:00 AM - 12:00 PM)</option>
                            <option value="afternoon">Afternoon (1:00 PM - 5:00 PM)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="message">Notes / Concerns</label>
                    <textarea id="message" rows="4" placeholder="Tell us anything we should know..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Confirm Booking Request</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Yabna Dental Clinic. All rights reserved.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
